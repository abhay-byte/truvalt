services:
  - type: web
    name: truvalt-api
    rootDir: web
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: REDIS_URL
        fromService:
          name: truvalt-redis
          type: keyvalue
          property: connectionString
      - key: SESSION_DRIVER
        value: redis
      - key: CACHE_STORE
        value: redis
      - key: QUEUE_CONNECTION
        value: sync

  - type: keyvalue
    name: truvalt-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []
